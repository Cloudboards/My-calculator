<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Button DOM Calculator</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<style>
body {
 background: linear-gradient(135deg, #fde9e9, #ffd1d1);
 margin: 10rem;
}
.card-body {
    background-color: #8ca6fd ;
}
.middle {
    justify-content: center;
    align-items: center;
}
</style>
<body>
<Div class="card p-4 shadow-lg card-body middle">
<div class="row g-4">

    <h2 align="center">Multi-Button Calculator</h2>
    <!-- number box input -->
    <input type="text" id="num1" placeholder="First Number" class="col-12 col-md-6 p-1 mb-0 rounded-3 border">
    <input type="text" id="num2" placeholder="Second Number" class="col-12 col-md-6 p-1 mb-0 rounded-3 border">
    <br><br>
</div>
<div class="column g-4">
    <!-- buttons -->
    <button id="addBtn" class="col-12 col-md-5 rounded-3 mt-1" style="width: 49%;">Add</button>
    <button id="subBtn" class="col-12 col-md-5 rounded-3 mt-1" style="width: 49%;">Subtract</button>
    <button id="mulBtn" class="col-12 col-md-5 rounded-3 mt-1" style="width: 49%;">Multiply</button>
    <button id="divBtn" class="col-12 col-md-5 rounded-3 mt-1" style="width: 49%;">Divide</button>
    <button id="clearBtn" class="col-12 col-md-12 rounded-3 mt-1" style="width: 99.5%;">Clear</button>

    <p class="card px-2" id="resultText" style="font-weight: bold; margin-top: 15px;" align="center">Result: </p>
</div>
</Div>
    <script src="app.js"></script>
</body>
</html>
